<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Trail Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Prevent caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

<!-- Map rotation wrapper: this whole div gets CSS-rotated for heading -->
<div id="map-rotate-wrapper">
    <div id="map"></div>
</div>

<!-- UI overlay — NOT inside the rotation wrapper so controls stay upright -->
<div id="ui-overlay">

    <!-- Mode badge -->
    <div id="modeBox">
        <span id="modeIcon">⧖</span>
        <span id="modeText">Locating…</span>
    </div>

    <!-- Re-center button (appears when user pans away in hiking mode) -->
    <button id="recenterBtn" class="hidden" onclick="recenterToUser()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="4"/>
            <line x1="12" y1="2" x2="12" y2="6"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="6" y2="12"/>
            <line x1="18" y1="12" x2="22" y2="12"/>
        </svg>
        Return to Me
    </button>

    <!-- Basemap selector -->
    <div id="basemapSelector">
        <button class="basemap-btn active" data-layer="standard" onclick="switchBasemap('standard', this)">
            🗺 Map
        </button>
        <button class="basemap-btn" data-layer="topo" onclick="switchBasemap('topo', this)">
            ⛰ Topo
        </button>
        <button class="basemap-btn" data-layer="satellite" onclick="switchBasemap('satellite', this)">
            🛰 Sat
        </button>
    </div>

    <!-- Zoom controls -->
    <div id="zoomControls">
        <button onclick="map.zoomIn()" class="zoom-btn">+</button>
        <button onclick="map.zoomOut()" class="zoom-btn">−</button>
    </div>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Trail text plugin -->
<script src="https://unpkg.com/leaflet-textpath@1.2.3/leaflet.textpath.js"></script>

<!-- App JS -->
<script src="js/map.js"></script>
<script src="js/trails.js"></script>
<script src="js/gps.js"></script>
<script src="js/orientation.js"></script>

</body>
</html>
