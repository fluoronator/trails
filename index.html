<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="app-version" content="v116" />
  <title>Trail Navigator v116</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --green:   #3fb950;
      --blue:    #58a6ff;
      --orange:  #f0883e;
    }

    html, body {
      height: 100%; width: 100%;
      /* dvh = dynamic viewport height, accounts for browser chrome on mobile */
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
    }

    #map-rotate-wrapper {
      position: fixed;
      /* Size the container large enough that its corners always cover
         the screen at any rotation angle, for any phone aspect ratio.
         We centre it on the 75% pivot point using negative margins.
         200vmax is generous enough for any current or future device —
         tiles outside the visible area are cached and never re-fetched. */
      width: 200vmax;
      height: 200vmax;
      top: 75vh;
      left: 50vw;
      margin-top: -100vmax;
      margin-left: -100vmax;
      transform-origin: 50% 50%;
      transform: rotate(0deg);
      will-change: transform;
      z-index: 1;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      /* Use dvh so overlay matches actual visible browser height */
      height: 100dvh;
      z-index: 1000;
      pointer-events: none;
    }
    #ui-overlay > * { pointer-events: auto; }

    /* ── TOP BAR ── */
    #top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: calc(56px + env(safe-area-inset-top));
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      padding: 0 12px;
      padding-top: env(safe-area-inset-top);
      padding-bottom: 10px;
      gap: 10px;
    }

    #park-name {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #mode-badge {
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      border-radius: 50%;
      border: 1.5px solid;
      transition: all 0.4s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #mode-badge.hiking  { color: var(--green);  border-color: var(--green);  background: rgba(63,185,80,0.12); }
    #mode-badge.browsing{ color: var(--blue);   border-color: var(--blue);   background: rgba(88,166,255,0.12); }

    /* ── NORTH ARROW (top-right, visible in hiking mode) ── */
    #north-arrow {
      position: absolute;
      top: calc(66px + env(safe-area-inset-top)); right: 12px;
      width: 48px; height: 48px;
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease-out, opacity 0.3s;
    }
    #north-arrow.hidden { opacity: 0; pointer-events: none; }

    /* ── MAP CONTROLS (zoom + recenter) — below the compass ── */
    #map-controls {
      position: absolute;
      top: calc(126px + env(safe-area-inset-top)); right: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 1001;
    }

    .map-ctrl-btn {
      width: 44px; height: 44px;
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 22px;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      line-height: 1;
      user-select: none;
      -webkit-user-select: none;
    }
    .map-ctrl-btn:active {
      transform: scale(0.92);
      background: rgba(40,60,80,0.95);
    }

    /* Recenter button — highlighted when user has panned away */
    #ctrl-recenter {
      color: var(--green);
      border-color: rgba(63,185,80,0.35);
    }
    #ctrl-recenter.hidden { display: none; }
    #ctrl-recenter.dimmed {
      color: var(--muted);
      border-color: var(--border);
    }

    /* ── BOTTOM BAR ── */
    #bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 8px 12px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #layer-group {
      display: flex;
      gap: 4px;
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 5px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }
    .layer-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 13px;
      border-radius: 18px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .layer-btn:active { transform: scale(0.95); }
    .layer-btn.active {
      background: rgba(255,255,255,0.15);
      color: #ffffff;
    }

    /* Go to Park — shown in browsing mode when panned away from park */
    #go-to-park-btn {
      flex: 1;
      background: var(--orange);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 14px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
    }
    #go-to-park-btn:active { opacity: 0.75; }
    #go-to-park-btn.hidden { display: none; }


    /* ── FEEDBACK BUTTON ── */
    #feedback-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 8px;
      line-height: 1;
      flex-shrink: 0;
      color: var(--muted);
      transition: color 0.2s, opacity 0.2s;
    }
    #feedback-btn:active { color: var(--text); }

    /* ── LEGEND BUTTON ── */
    #legend-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 8px;
      line-height: 1;
      flex-shrink: 0;
      color: var(--muted);
      transition: color 0.2s;
    }
    #legend-btn:active  { color: var(--text); }
    #legend-btn.active  { color: var(--green); }

    /* ── LEGEND PANEL ── */
    #legend-panel {
      position: absolute;
      top: calc(92px + env(safe-area-inset-top)); left: 12px;
      background: rgba(13,17,23,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 160px;
      max-width: 220px;
      z-index: 2100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #legend-panel.hidden { display: none; }
    #legend-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    #legend-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    #legend-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }
    #legend-close:active { color: var(--text); }
    #legend-entries {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .legend-entry {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .legend-swatch {
      width: 24px;
      height: 4px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .legend-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    /* ── FEEDBACK OVERLAY ── */
    #feedback-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 2500;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      padding-top: max(20px, env(safe-area-inset-top));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #feedback-overlay.hidden { display: none; }

    #feedback-panel {
      background: #ffffff;
      border: 1px solid #cccccc;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      padding: 20px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }

    #feedback-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    #feedback-title {
      font-size: 17px;
      font-weight: 700;
      color: #111111;
    }
    #feedback-close {
      background: none;
      border: none;
      color: #555555;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      line-height: 1;
    }
    #feedback-close:active { background: #eeeeee; }

    #feedback-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #feedback-message {
      background: #f5f5f5;
      border: 1.5px solid #cccccc;
      border-radius: 10px;
      color: #111111;
      font-size: 15px;
      font-family: inherit;
      padding: 10px 12px;
      resize: none;
      height: 120px;
      outline: none;
    }
    #feedback-message:focus { border-color: #1a7abf; }
    #feedback-contact {
      background: #f5f5f5;
      border: 1.5px solid #cccccc;
      border-radius: 10px;
      color: #111111;
      font-size: 14px;
      font-family: inherit;
      padding: 10px 12px;
      outline: none;
    }
    #feedback-contact:focus { border-color: #1a7abf; }
    #feedback-contact::placeholder,
    #feedback-message::placeholder { color: #888888; }

    #feedback-submit {
      background: #1a7abf;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      padding: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #feedback-submit:active { opacity: 0.75; }
    #feedback-submit:disabled {
      opacity: 0.35;
      cursor: default;
    }

    #feedback-thankyou {
      text-align: center;
      padding: 20px 0 8px;
    }
    #feedback-thankyou.hidden { display: none; }
    #feedback-thanks-icon {
      font-size: 40px;
      color: #1a7abf;
      margin-bottom: 10px;
    }
    #feedback-thanks-text {
      font-size: 16px;
      font-weight: 600;
      color: #111111;
    }

    /* ── IOS COMPASS TAP OVERLAY ── */
    #tap-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      cursor: pointer;
    }
    #tap-overlay.hidden { display: none; }
    #tap-overlay-inner { text-align: center; padding: 32px; }
    #tap-overlay-icon  { font-size: 56px; margin-bottom: 16px; }
    #tap-overlay-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    #tap-overlay-sub   { font-size: 14px; color: var(--muted); }

    /* ── ZOOM BADGE ── */


    /* ── STATUS TOAST ── */
    #status-toast {
      position: absolute;
      top: calc(64px + env(safe-area-inset-top)); left: 50%;
      transform: translateX(-50%);
      background: rgba(22,27,34,0.93);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-size: 12px;
      padding: 5px 14px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.6s;
    }
    #status-toast.hidden { opacity: 0; }

    /* ── USER LOCATION DOT ── */
    .user-dot-wrap {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(88,166,255,0.22);
      display: flex; align-items: center; justify-content: center;
      animation: gpulse 2.2s infinite;
      will-change: transform;
      transform: translateZ(0);
    }
    .user-dot-inner {
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #58a6ff;
      border: 2.5px solid #fff;
      box-shadow: 0 0 6px rgba(88,166,255,0.8);
      will-change: transform;
      transform: translateZ(0);
    }
    @keyframes gpulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(88,166,255,0.45); }
      55%      { box-shadow: 0 0 0 9px rgba(88,166,255,0); }
    }


    .leaflet-control-attribution {
      background: rgba(13,17,23,0.75) !important;
      color: var(--muted) !important;
      font-size: 10px !important;
    }
    .leaflet-control-attribution a { color: var(--blue) !important; }

    /* Hide default zoom (we use our own +/- via the map's built-in zoom ctrl) */
    /* ── Trail name label ── */
/* ── POI permanent label ── */
    .poi-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: #000 !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      line-height: 1.2 !important;
      padding: 0 !important;
      max-width: 80px !important;
      white-space: normal !important;
      word-wrap: break-word !important;
      text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff !important;
    }
    .poi-label::before { display: none !important; }
    .poi-label-hidden  { display: none !important; }

    /* ── MAP TEXT LABEL (class=Label in GeoJSON) ── */
    /* Same styling as .poi-label — only difference is text is centred on
       the coordinate rather than offset to the right of a pin icon. */
    .map-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: #000 !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      line-height: 1.2 !important;
      padding: 0 !important;
      max-width: 80px !important;
      white-space: normal !important;
      word-wrap: break-word !important;
      text-align: center !important;
      text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff !important;
    }
    .map-label::before { display: none !important; }

  </style>
</head>
<body>

<!-- ═══ ROTATION WRAPPER — only this div gets rotated ═══ -->
<div id="map-rotate-wrapper">
  <div id="map"></div>
</div>

<!-- ═══ UI OVERLAY — never rotates ═══ -->
<div id="ui-overlay">

  <div id="top-bar">
    <div id="park-name">🥾 Trail Navigator</div>
    <div id="mode-badge" class="browsing">🗺</div>
    <button id="legend-btn" title="Trail legend">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
    </button>
    <button id="feedback-btn" title="Send feedback">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
  </div>

  <!-- Feedback overlay -->
  <div id="feedback-overlay" class="hidden">
    <div id="feedback-panel">
      <div id="feedback-header">
        <div id="feedback-title">Feedback</div>
        <button id="feedback-close">✕</button>
      </div>
      <form id="feedback-form" action="https://formspree.io/f/xreoyjyz" method="POST">
        <textarea name="message" id="feedback-message" 
          placeholder="Bug report, suggestion, or general feedback…" 
          required></textarea>
        <input type="text" name="contact" id="feedback-contact"
          placeholder="Contact info (optional — stay anonymous)" />
        <button type="submit" id="feedback-submit" disabled>Send Feedback</button>
      </form>
      <div id="feedback-thankyou" class="hidden">
        <div id="feedback-thanks-icon">✓</div>
        <div id="feedback-thanks-text">Thanks for your feedback!</div>
      </div>
    </div>
  </div>


  <!-- Trail legend panel -->
  <div id="legend-panel" class="hidden">
    <div id="legend-header">
      <div id="legend-title">Trail Legend</div>
      <button id="legend-close">✕</button>
    </div>
    <div id="legend-entries"></div>
  </div>

  <div id="status-toast" class="hidden">Ready</div>

  <!-- North arrow: counter-rotates to always point true north -->
  <div id="north-arrow">
    <svg viewBox="0 0 40 40" width="36" height="36">
      <polygon points="20,4 26,20 20,17 14,20" fill="#e74c3c"/>
      <polygon points="20,36 26,20 20,23 14,20" fill="#888"/>
      <text x="20" y="12" text-anchor="middle" fill="white"
            font-size="7" font-family="sans-serif" font-weight="700">N</text>
    </svg>
  </div>

  <!-- Map controls: zoom in, zoom out, recenter — below compass -->
  <div id="map-controls">
    <button class="map-ctrl-btn" id="ctrl-zoom-in"  aria-label="Zoom in">+</button>
    <button class="map-ctrl-btn" id="ctrl-zoom-out" aria-label="Zoom out">−</button>
    <button class="map-ctrl-btn dimmed" id="ctrl-recenter" aria-label="Return to my location">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2"  x2="12" y2="7"/>
        <line x1="12" y1="17" x2="12" y2="22"/>
        <line x1="2"  y1="12" x2="7"  y2="12"/>
        <line x1="17" y1="12" x2="22" y2="12"/>
      </svg>
    </button>
  </div>

  <!-- iOS compass permission overlay — shown on first load, dismissed on tap -->
  <div id="tap-overlay" class="hidden">
    <div id="tap-overlay-inner">
      <div id="tap-overlay-icon">🧭</div>
      <div id="tap-overlay-title">Tap to Enable Compass</div>
      <div id="tap-overlay-sub">Required for map rotation</div>
    </div>
  </div>

  <div id="bottom-bar">
    <div id="layer-group">
      <button class="layer-btn"        data-layer="map">Map</button>
      <button class="layer-btn"        data-layer="topo">Topo</button>
      <button class="layer-btn active" data-layer="sat">Sat</button>
    </div>
    <button id="go-to-park-btn" class="hidden">🗺 Go to Park</button>
  </div>

</div><!-- end #ui-overlay -->

<script>
/* ═══════════════════════════════════════════════════════════════════
   ████  SETTINGS  ████
   All the values you're likely to want to tweak are here.
   Everything else in this file should rarely need changing.
════════════════════════════════════════════════════════════════════ */
const SETTINGS = {

  // ── MAP ZOOM LEVELS ──────────────────────────────────────────────
  // Zoom when the app first opens on the park overview
  browsingZoom:      18,
  // Zoom used when following your location while hiking
  hikingZoom:        18,

  // ── HIKING MODE DETECTION ────────────────────────────────────────
  // How close (metres) to the park centre before Hiking mode activates.
  // Increase to a large number (e.g. 999999) to force Hiking mode
  // while testing from your desk.
  hikingRadius:      3200,

  // ── POI MARKERS ─────────────────────────────────────────────────
  // Zoom level below which POI icons disappear (avoids clutter)
  poiIconMinZoom:    17,
  // Zoom level below which POI label text disappears
  poiLabelMinZoom:   17,
  // Label font size (px) at each zoom level — [zoom17, zoom18, zoom19+]
  poiLabelFontSizes: [12, 14, 16],
  // How far the label text sits to the right of the icon [x, y] pixels
  poiLabelOffset:    [8, -8],

  // ── TRAIL LABELS ─────────────────────────────────────────────────
  // Zoom level below which trail name labels disappear
  // Trail label font size (px) at each zoom level — [zoom15, zoom16, zoom17, zoom18, zoom19+]

  // ── MAP FOLLOWING BEHAVIOUR ──────────────────────────────────────
  // Seconds of inactivity before map snaps back to your location
  // after you've panned away in hiking mode
  recenterDelaySec:  6,
  // Minimum metres moved before the dot updates (filters GPS jitter)
  minMoveDot:        0.5,
  // Minimum metres moved before the map pans to follow you
  minMoveFollow:     0.5,

  // ── COMPASS ROTATION ─────────────────────────────────────────────
  // Compass heading must change by more than this many degrees before
  // the map rotates — filters sensor noise (higher = less jitter)
  compassDeadZoneDeg: 1.5,
};
/* ══════════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════
   PARK CONFIGURATION
   ─────────────────────────────────────────────────────────────────
   To add a park:
   1. Add an entry to this array
   2. Set id to a short URL-friendly name (no spaces, lowercase)
   3. Put the GeoJSON file in the same folder as index.html
   4. Create a QR code pointing to:
      https://yourusername.github.io/trails/?park=your-park-id

   If no ?park= parameter is given, the first park in the list loads.
════════════════════════════════════════════════════════════════════ */
const PARKS = [
  {
    id:            'hurricane-creek',   // ?park=hurricane-creek loads hurricane-creek.geojson
    name:          'Hurricane Creek Park',
    hikingRadius:  SETTINGS.hikingRadius,
    defaultZoom:   SETTINGS.browsingZoom,
    hikingZoom:    SETTINGS.hikingZoom,
    defaultCenter: null,
  },
  // Add more parks here — geojsonUrl is automatic (id + '.geojson'):
  // {
  //   id:            'jones-valley',      // ?park=jones-valley loads jones-valley.geojson
  //   name:          'Jones Valley Trail',
  //   hikingRadius:  SETTINGS.hikingRadius,
  //   defaultZoom:   SETTINGS.browsingZoom,
  //   hikingZoom:    SETTINGS.hikingZoom,
  //   defaultCenter: null,
  // },
];

/* ═══════════════════════════════════════════════════════════════════
   TILE LAYERS
════════════════════════════════════════════════════════════════════ */
const TILE_DEFS = {
  map:  { url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
          opts: { attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 22 } },
  topo: { url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
          opts: { attribution: '© <a href="https://opentopomap.org">OpenTopoMap</a>', maxZoom: 22, maxNativeZoom: 17 } },
  sat:  { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
          opts: { attribution: '© <a href="https://www.esri.com">Esri</a>', maxZoom: 22, maxNativeZoom: 19 } },
};

/* ═══════════════════════════════════════════════════════════════════
   TIMING
════════════════════════════════════════════════════════════════════ */
const RECENTER_DELAY_MS = SETTINGS.recenterDelaySec * 1000;
const TOAST_MS          = 2500;

/* ═══════════════════════════════════════════════════════════════════
   PARK SELECTION FROM URL
   Reads ?park=id from the URL and finds the matching park.
   Falls back to the first park if no parameter or unrecognised id.
════════════════════════════════════════════════════════════════════ */
const urlParkId    = new URLSearchParams(window.location.search).get('park');

// If a ?park= parameter is given, use it directly — no need to pre-register
// in the PARKS array. The GeoJSON filename is always parkId + '.geojson'.
// If no parameter given, fall back to the first park in the PARKS array.
const selectedPark = urlParkId
  ? (PARKS.find(p => p.id === urlParkId) || {
      id:            urlParkId,
      name:          urlParkId,   // GeoJSON name property will override this
      hikingRadius:  SETTINGS.hikingRadius,
      defaultZoom:   SETTINGS.browsingZoom,
      hikingZoom:    SETTINGS.hikingZoom,
      defaultCenter: null,
    })
  : PARKS[0];

// GeoJSON filename is always derived from park id
selectedPark.geojsonUrl = selectedPark.id + '.geojson';


const S = {
  park:         selectedPark,
  isHiking:     false,
  isTracking:   false,
  userMovedMap: false,
  userLatLng:   null,
  hasCentered:  false,
  parkCenter:   null,
  parkBounds:   null,
  defaultZoom:  selectedPark.defaultZoom,
  hikingZoom:   selectedPark.hikingZoom,
  recenterTimer: null,
  zoomTimer:    null,
};

// Also expose isHiking on window so orientation code can read it
window.isHikingMode = false;

/* ═══════════════════════════════════════════════════════════════════
   MAP INIT
════════════════════════════════════════════════════════════════════ */
const map = L.map('map', { zoomControl: false, attributionControl: true });

let activeTileLayer = null;
function setTileLayer(name) {
  if (activeTileLayer) map.removeLayer(activeTileLayer);
  const d = TILE_DEFS[name];
  activeTileLayer = L.tileLayer(d.url, d.opts).addTo(map);
  document.querySelectorAll('.layer-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.layer === name)
  );
}
setTileLayer('sat');


/* ═══════════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg, ms = TOAST_MS) {
  const el = document.getElementById('status-toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(toastTimer);
  if (ms > 0) toastTimer = setTimeout(() => el.classList.add('hidden'), ms);
}


function styleForLine(p) {
  return {
    color:    p.stroke            || '#FF0000',
    weight:   (p['stroke-width']  ?? 2) + 1,
    opacity:  p['stroke-opacity'] ?? 0.9,
    lineCap: 'round', lineJoin: 'round',
  };
}
function styleForPolygon(p) {
  return {
    color:       p.stroke            || '#00cd00',
    weight:      p['stroke-width']   ?? 2,
    opacity:     p['stroke-opacity'] ?? 0.8,
    fillColor:   p.fill              || p.stroke || '#00cd00',
    fillOpacity: p['fill-opacity']   ?? 0.15,
  };
}
function makePOIIcon(p) {
  const c = p.stroke || p['marker-color'] || '#e05c2a';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="24" viewBox="0 0 26 34">
    <path d="M13 0C5.82 0 0 5.82 0 13c0 8.66 13 21 13 21S26 21.66 26 13C26 5.82 20.18 0 13 0z" fill="${c}" opacity="0.92"/>
    <circle cx="13" cy="13" r="5.5" fill="white" opacity="0.88"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '',
    iconSize: [18,24], iconAnchor: [9,24], popupAnchor: [0,-24] });
}

/* ═══════════════════════════════════════════════════════════════════
   TRAIL LABELS
   One centred label per named trail, rotated to follow the line.
════════════════════════════════════════════════════════════════════ */
let geojsonLayer = null;
let lastGeojsonData = null;
const poiLayers = [];   // all Point marker layers, for zoom-based label toggling

// Labels visible at this zoom level and above
const POI_LABEL_MIN_ZOOM = SETTINGS.poiLabelMinZoom;
const POI_ICON_MIN_ZOOM  = SETTINGS.poiIconMinZoom;

function updatePoiLabelVisibility() {
  const zoom      = map.getZoom();
  const showLabel = zoom >= POI_LABEL_MIN_ZOOM;
  const showIcon  = zoom >= POI_ICON_MIN_ZOOM;

  // Font size steps from SETTINGS
  const sizes    = SETTINGS.poiLabelFontSizes;
  const step     = Math.min(2, Math.max(0, zoom - 17));
  const fontSize = sizes[step];
  const maxWidth = Math.max(80, Math.min(120, 80 + (zoom - 17) * 20));

  poiLayers.forEach(layer => {
    const tt = layer.getTooltip();
    if (tt) {
      const el = tt.getElement();
      if (el) {
        const isLabel = el.classList.contains('map-label');
        // Labels hide at same threshold as icons; POI text hides at label threshold
        el.classList.toggle('poi-label-hidden', isLabel ? !showIcon : !showLabel);
        el.style.fontSize = fontSize + 'px';
        el.style.maxWidth = maxWidth + 'px';
      }
    }
    // Toggle icon — labels have invisible icon so this is harmless
    if (layer._icon) {
      layer._icon.style.display = showIcon ? '' : 'none';
    }
  });
}

map.on('zoomend', () => {
  updatePoiLabelVisibility();
});
function loadPark(park) {
  showToast('Loading trail data…', 0);
  fetch(park.geojsonUrl)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      if (geojsonLayer) map.removeLayer(geojsonLayer);
      poiLayers.length = 0;  // clear on reload

      // Scan for a ParkCenter feature before creating the layer
      // properties.class === "ParkCenter" (case-insensitive)
      let geojsonParkCenter = null;
      (data.features || []).forEach(f => {
        if (f.geometry && f.geometry.type === 'Point') {
          const cls = ((f.properties || {}).class || '').toLowerCase();
          if (cls === 'parkcenter') {
            const [lng, lat] = f.geometry.coordinates;
            geojsonParkCenter = L.latLng(lat, lng);
          }
        }
      });

      geojsonLayer = L.geoJSON(data, {
        style: f => {
          const p = f.properties || {}, t = f.geometry.type;
          if (t === 'LineString'  || t === 'MultiLineString') return styleForLine(p);
          if (t === 'Polygon'     || t === 'MultiPolygon')    return styleForPolygon(p);
          return {};
        },
        pointToLayer: (f, ll) => {
          const p = f.properties || {};
          const cls = (p.class || p['marker-symbol'] || '').toLowerCase();
          const isLabel = cls === 'label';
          const isParkCenter = cls === 'parkcenter';
          const icon = (isLabel || isParkCenter)
            // Invisible 1px icon — nothing shown on map
            ? L.divIcon({ html: '', className: '', iconSize: [1,1], iconAnchor: [0,0] })
            : makePOIIcon(p);
          const marker = L.marker(ll, { icon, interactive: false });
          if (!isParkCenter) poiLayers.push(marker);
          return marker;
        },
        onEachFeature: (f, layer) => {
          const p = f.properties || {}, t = f.geometry.type;
          const cls = (p.class || p['marker-symbol'] || '').toLowerCase();
          const title = (p.title || '').trim();
          const isTS  = /^\d{1,2}:\d{2}:\d{2}/.test(title);
          const cleanTitle = isTS ? '' : title;
          const isLabel = cls === 'label';
          const isParkCenter = cls === 'parkcenter';

          if (t === 'Point' && cleanTitle && !isParkCenter) {
            if (isLabel) {
              // Text-only label — centred on the coordinate, no icon offset
              layer.bindTooltip(cleanTitle, {
                permanent:  true,
                direction:  'center',
                offset:     [0, 0],
                className:  'map-label',
              });
            } else {
              // Normal POI — label beside the pin
              layer.bindTooltip(cleanTitle, {
                permanent:  true,
                direction:  'right',
                offset:     SETTINGS.poiLabelOffset,
                className:  'poi-label',
              });
            }
          }
        },
      }).addTo(map);

      S.parkBounds = geojsonLayer.getBounds();
      if (S.parkBounds.isValid()) {
        // Priority: GeoJSON ParkCenter → PARKS array defaultCenter → bounds center
        S.parkCenter = geojsonParkCenter
          || (park.defaultCenter ? L.latLng(park.defaultCenter[0], park.defaultCenter[1]) : null)
          || S.parkBounds.getCenter();
        // Open at zoom 18 centred on the park
        map.setView(S.parkCenter, S.defaultZoom, { animate: false });
            }

      // Use name from GeoJSON if present, otherwise fall back to config name
      const parkName = data.name || park.name;
      document.getElementById('park-name').textContent = '🥾 ' + parkName;
      lastGeojsonData = data;
      buildLegend(data);
      showToast('Trails loaded ✓');
      // Build trail labels after a short delay so map zoom is settled
      setTimeout(updatePoiLabelVisibility, 800);
      startGeolocation();
    })
    .catch(err => {
      console.error('GeoJSON error:', err);
      showToast('⚠️ Could not load trail data', 0);
    });
}

/* ═══════════════════════════════════════════════════════════════════
   USER MARKER
════════════════════════════════════════════════════════════════════ */
let userMarker = null;
function placeOrMoveUser(latlng) {
  if (!userMarker) {
    const wrap = document.createElement('div');
    wrap.className = 'user-dot-wrap';
    wrap.innerHTML = '<div class="user-dot-inner"></div>';
    userMarker = L.marker(latlng, {
      icon: L.divIcon({ html: wrap, className: '', iconSize: [24,24], iconAnchor: [12,12] }),
      zIndexOffset: 1000, interactive: false,
    }).addTo(map);
  } else {
    userMarker.setLatLng(latlng);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   DISTANCE HELPER
════════════════════════════════════════════════════════════════════ */
function metreBetween(lat1, lon1, lat2, lon2) {
  const R = 6371000, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ═══════════════════════════════════════════════════════════════════
   MODE MANAGEMENT
════════════════════════════════════════════════════════════════════ */
function setMode(mode) {
  const hiking    = mode === 'hiking';
  const wasHiking = S.isHiking;
  S.isHiking      = hiking;
  window.isHikingMode = hiking;

  const badge   = document.getElementById('mode-badge');
  const wrapper = document.getElementById('map-rotate-wrapper');

  if (hiking) {
    badge.textContent = '⛰';
    badge.className   = 'hiking';
    document.getElementById('go-to-park-btn').classList.add('hidden');
    if (!wasHiking) {
      S.userMovedMap = false;
      showRecenterBtn(false);
      checkCompassOnHikingStart();
    }
  } else {
    badge.textContent = '🗺';
    badge.className   = 'browsing';
    showCompassBtn(false);
    clearTimeout(compassCheckTimer);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   OFFSET PAN — keeps user dot at 3/4 down the screen in hiking mode.
   Works by converting the target latlng to a pixel point, shifting it
   up by 25% of screen height, then converting back to latlng and
   using a plain panTo. No secondary panBy, no padding options.
════════════════════════════════════════════════════════════════════ */
function panToUser(latlng, animate) {
  // The map container is 200vmax × 200vmax, centred at screen (50vw, 75vh).
  // latLngToContainerPoint returns coords in container space.
  // We need to convert to screen space to find where the dot currently appears.
  const vmax = Math.max(window.innerWidth, window.innerHeight);
  const containerW = 2 * vmax;
  const containerH = 2 * vmax;
  // Container top-left in screen coordinates
  const containerOriginX = window.innerWidth  * 0.5  - containerW * 0.5;
  const containerOriginY = window.innerHeight * 0.75 - containerH * 0.5;

  // Where the latlng currently appears in container space
  const ptContainer = map.latLngToContainerPoint(latlng);
  // Convert to screen space
  const ptScreen = L.point(
    ptContainer.x + containerOriginX,
    ptContainer.y + containerOriginY
  );
  // Where we want it on screen: 75% down, 50% across
  const desiredScreen = L.point(
    window.innerWidth  * 0.5,
    window.innerHeight * 0.75
  );
  // Delta in screen space
  const delta = ptScreen.subtract(desiredScreen);
  // The new map centre in container space
  const newCentreContainer = L.point(
    containerW * 0.5 + delta.x,
    containerH * 0.5 + delta.y
  );
  const newCentre = map.containerPointToLatLng(newCentreContainer);
  map.panTo(newCentre, { animate: animate !== false, duration: 0.5 });
}

/* ═══════════════════════════════════════════════════════════════════
   RECENTER LOGIC
════════════════════════════════════════════════════════════════════ */
function showRecenterBtn(show) {
  const btn = document.getElementById('ctrl-recenter');
  if (show) {
    btn.classList.remove('dimmed');
  } else {
    btn.classList.add('dimmed');
  }
}

function recenterToUser() {
  if (!S.userLatLng) return;
  if (map.getZoom() < S.hikingZoom) map.setZoom(S.hikingZoom);
  panToUser(S.userLatLng, true);
  S.userMovedMap = false;
  showRecenterBtn(false);
  clearTimeout(S.recenterTimer);
}

function resetRecenterTimer() {
  clearTimeout(S.recenterTimer);
  if (S.isHiking && S.userMovedMap) {
    // Small extra delay so multi-swipe gestures don't trigger snap-back
    // between swipes. Also don't start while finger is still on screen.
    S.recenterTimer = setTimeout(() => {
      if (S.userMovedMap && S.isHiking && !isTouching) {
        recenterToUser();
      }
    }, RECENTER_DELAY_MS);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   MAP DRAG / ZOOM — detect manual interaction
════════════════════════════════════════════════════════════════════ */

// Track whether finger is currently on screen — block GPS pans during touch
let isTouching = false;
document.addEventListener('touchstart', () => { isTouching = true;  }, { passive: true });
document.addEventListener('touchend',   () => { isTouching = false; }, { passive: true });
document.addEventListener('touchcancel',() => { isTouching = false; }, { passive: true });

map.on('dragstart', () => {
  S.userMovedMap = true;
  if (S.isHiking) showRecenterBtn(true);
  clearTimeout(S.recenterTimer);  // cancel any pending snap-back while dragging
});

// Only start the return countdown when the finger lifts
map.on('dragend', () => {
  resetRecenterTimer();
});

map.on('zoomstart', e => {
  if (e.originalEvent) {
    S.userMovedMap = true;
    if (S.isHiking) showRecenterBtn(true);
    clearTimeout(S.recenterTimer);
  }
});

map.on('zoomend', () => {
  if (S.userMovedMap) resetRecenterTimer();
});

/* ═══════════════════════════════════════════════════════════════════
   GEOLOCATION
════════════════════════════════════════════════════════════════════ */

// Minimum movement thresholds to filter GPS jitter
const MIN_MOVE_METRES_DOT    = SETTINGS.minMoveDot;
const MIN_MOVE_METRES_FOLLOW = SETTINGS.minMoveFollow;

function startGeolocation() {
  if (!navigator.geolocation) {
    showToast('Geolocation not supported');
    setMode('browsing');
    return;
  }
  showToast('Requesting location…', 0);

  navigator.geolocation.watchPosition(
    pos => {
      const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);

      // Jitter filter
      const prevLatLng    = S.userLatLng;
      const movedMetres   = prevLatLng
        ? metreBetween(prevLatLng.lat, prevLatLng.lng, latlng.lat, latlng.lng)
        : Infinity;

      S.userLatLng = latlng;

      // Move the dot if position changed meaningfully
      if (movedMetres >= MIN_MOVE_METRES_DOT) {
        placeOrMoveUser(latlng);
      }

      // Mode detection (only once park centre is known)
      if (S.parkCenter) {
        const dist      = metreBetween(latlng.lat, latlng.lng, S.parkCenter.lat, S.parkCenter.lng);
        const shouldHike = dist <= S.park.hikingRadius;
        const wasHiking  = S.isHiking;
        setMode(shouldHike ? 'hiking' : 'browsing');

        if (shouldHike && !wasHiking && !S.hasCentered) {
          S.hasCentered = true;
          map.setZoom(S.hikingZoom);
          panToUser(latlng, false);
          return;
        }
      }

      // Regular GPS follow — pan map every update when hiking and not manually panned
      // Also follow in browse mode when user has pressed Find Me (isTracking)
      const shouldFollow = (S.isHiking && !S.userMovedMap) ||
                           (!S.isHiking && S.isTracking);
      if (shouldFollow && movedMetres >= MIN_MOVE_METRES_FOLLOW && !isTouching) {
        panToUser(latlng, true);
      }

      const acc = pos.coords.accuracy ? `± ${Math.round(pos.coords.accuracy)}m` : '';
      showToast(`Located ${acc}`);
    },
    err => {
      console.warn('GPS error:', err.message);
      showToast('Location unavailable — Browsing mode');
      setMode('browsing');
    },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
  );
}

/* ═══════════════════════════════════════════════════════════════════
   FIND ME / GO TO PARK BUTTON  (browsing mode only)
════════════════════════════════════════════════════════════════════ */
// Go to Park button — browse mode, flies back to park overview
document.getElementById('go-to-park-btn').addEventListener('click', () => {
  S.isTracking = false;
  document.getElementById('go-to-park-btn').classList.add('hidden');
  if (S.parkCenter) {
    map.setView(S.parkCenter, S.defaultZoom, { animate: false });
  } else if (S.parkBounds && S.parkBounds.isValid()) {
    map.fitBounds(S.parkBounds, { padding: [50,50], animate: false });
  }
});

// Crosshair button — flies to user location in both hiking and browsing mode
document.getElementById('ctrl-zoom-in') .addEventListener('click', () => map.zoomIn());
document.getElementById('ctrl-zoom-out').addEventListener('click', () => map.zoomOut());
document.getElementById('ctrl-recenter').addEventListener('click', () => {
  if (S.isHiking) {
    // Hiking mode — snap back to user and resume following
    recenterToUser();
  } else {
    // Browsing mode — fly to user and start following, show Go to Park
    if (S.userLatLng) {
      S.isTracking   = true;
      S.userMovedMap = false;
      document.getElementById('go-to-park-btn').classList.remove('hidden');
      if (map.getZoom() < S.hikingZoom) map.setZoom(S.hikingZoom);
      panToUser(S.userLatLng, true);
    } else {
      showToast('Waiting for location…');
    }
  }
});

document.querySelectorAll('.layer-btn').forEach(btn =>
  btn.addEventListener('click', () => setTileLayer(btn.dataset.layer))
);

/* ═══════════════════════════════════════════════════════════════════
   FIX PANNING UNDER MAP ROTATION
   Problem: The map wrapper is CSS-rotated, but Leaflet's drag handler
   computes deltas in raw screen pixels. Those screen pixels don't align
   with map axes when rotated, so panning goes the wrong direction.

   Fix: Hook into Leaflet's Draggable after map init. Before Leaflet
   records each pointer position, rotate the pointer coordinates by
   +heading around the map centre. This makes Leaflet "see" pointer
   movement as if the map were north-up, so its delta math is correct.

   We rotate the pointer, not the delta, because Leaflet's Draggable
   stores absolute positions and diffs them internally.
════════════════════════════════════════════════════════════════════ */
map.whenReady(function() {
  const draggable = map.dragging._draggable;
  if (!draggable) return;

  // Rotate a screen point around the map container centre by `deg` degrees
  function rotatePointAroundCenter(x, y, deg) {
    // Pivot is at screen position (50vw, 75vh) — use window dimensions
    // since the map container is now much larger than the screen
    const cx  = window.innerWidth  * 0.5;
    const cy  = window.innerHeight * 0.75;
    const rad = deg * Math.PI / 180;
    const cos = Math.cos(rad);
    const sin = Math.sin(rad);
    const dx  = x - cx;
    const dy  = y - cy;
    return {
      x: cx + dx * cos - dy * sin,
      y: cy + dx * sin + dy * cos,
    };
  }

  function makeSynth(e, clientX, clientY) {
    return new Proxy(e, {
      get(target, prop) {
        if (prop === 'clientX') return clientX;
        if (prop === 'clientY') return clientY;
        if (prop === 'touches') return [{
          clientX, clientY,
          identifier: e.touches ? e.touches[0].identifier : 0,
          target: e.touches ? e.touches[0].target : e.target,
        }];
        if (prop === 'changedTouches') return [{
          clientX, clientY,
          identifier: e.changedTouches ? e.changedTouches[0].identifier : 0,
          target: e.changedTouches ? e.changedTouches[0].target : e.target,
        }];
        const val = target[prop];
        return typeof val === 'function' ? val.bind(target) : val;
      }
    });
  }

  // Leaflet updates _startPoint on every move (it's a running reference),
  // so we cannot use _startPoint changes to detect new drags.
  // Instead we track the raw touch/mouse position: a jump > 20px means
  // the finger was lifted and a new drag began.

  let lastRawX = null;
  let lastRawY = null;
  let rotatedStartX = null;
  let rotatedStartY = null;

  const origOnMove = draggable._onMove.bind(draggable);
  draggable._onMove = function(e) {
    const h = currentHeading;
    if (!h) { origOnMove(e); return; }

    let rawX, rawY;
    if (e.touches && e.touches.length > 0) {
      rawX = e.touches[0].clientX;
      rawY = e.touches[0].clientY;
    } else {
      rawX = e.clientX;
      rawY = e.clientY;
    }

    // Detect new drag: finger jumped more than 20px from last known position
    const isNewDrag = lastRawX === null ||
      Math.abs(rawX - lastRawX) > 20 ||
      Math.abs(rawY - lastRawY) > 20;

    if (isNewDrag) {
      const sp = draggable._startPoint;
      if (sp) {
        const r = rotatePointAroundCenter(sp.x, sp.y, h);
        rotatedStartX = r.x;
        rotatedStartY = r.y;
        draggable._startPoint = L.point(rotatedStartX, rotatedStartY);
      }
    } else {
      if (rotatedStartX !== null) {
        draggable._startPoint = L.point(rotatedStartX, rotatedStartY);
      }
    }

    lastRawX = rawX;
    lastRawY = rawY;

    const rot = rotatePointAroundCenter(rawX, rawY, h);
    origOnMove(makeSynth(e, rot.x, rot.y));
  };

  // Reset on drag end so next drag is detected correctly
  map.on('dragend', function() {
    lastRawX = null;
    lastRawY = null;
    rotatedStartX = null;
    rotatedStartY = null;
  });
});

/* ═══════════════════════════════════════════════════════════════════
   COMPASS / MAP ROTATION
   Rotates #map-rotate-wrapper. UI overlay never rotates.
   Uses UNBOUNDED heading float to prevent wrap-around spin.
════════════════════════════════════════════════════════════════════ */
const mapWrapper = document.getElementById('map-rotate-wrapper');
const northArrow = document.getElementById('north-arrow');

let currentHeading      = 0;   // unbounded — never normalize to [0,360)
let targetHeading       = 0;   // unbounded
let browsingNeedleHeading = 0; // unbounded — needle only in browsing mode, never affects map rotation
let smoothingActive     = false;

function shortestDelta(from, to) {
  return ((to - from + 540) % 360) - 180;
}

function applyRotation(heading) {
  mapWrapper.style.transform = `rotate(${-heading}deg)`;
  northArrow.style.transform = `rotate(${-heading}deg)`;
  window.mapRotationDeg = ((heading % 360) + 360) % 360;
}

function smoothRotation() {
  const delta = targetHeading - currentHeading;
  if (Math.abs(delta) < SETTINGS.compassDeadZoneDeg) {
    currentHeading = targetHeading;
    applyRotation(currentHeading);
    smoothingActive = false;
    return;
  }
  currentHeading += delta * 0.15;
  applyRotation(currentHeading);
  requestAnimationFrame(smoothRotation);
}

function handleOrientation(e) {
  orientationEventCount++;
  if (orientationEventCount === 1) showCompassBtn(false);

  // Get raw heading regardless of mode
  let raw;
  if (typeof e.webkitCompassHeading === 'number' && e.webkitCompassHeading >= 0) {
    // iOS — webkitCompassHeading is always true north, portrait-corrected by the OS
    raw = e.webkitCompassHeading;
  } else if (e.alpha != null) {
    // Android / Chromium (including Tesla) — alpha is CCW from north, convert to CW
    raw = (360 - e.alpha) % 360;

    // Correct for screen orientation. On a landscape device (Tesla screen is always
    // landscape) the axes are rotated 90° relative to portrait. We detect this using
    // screen.orientation if available, falling back to comparing width vs height.
    // We do NOT apply this correction on iOS (webkitCompassHeading path above handles it).
    let screenAngle = 0;
    if (screen.orientation && screen.orientation.angle !== undefined) {
      screenAngle = screen.orientation.angle;
    } else if (typeof window.orientation === 'number') {
      screenAngle = window.orientation;
    } else if (window.innerWidth > window.innerHeight) {
      // No orientation API — infer landscape from dimensions
      screenAngle = 90;
    }
    // Adjust heading for screen rotation
    raw = ((raw - screenAngle) + 360) % 360;
  } else {
    return;
  }

  if (!window.isHikingMode) {
    // Browsing mode — update the needle only, keep map north-up.
    // IMPORTANT: Do NOT modify currentHeading or targetHeading here.
    // The drag patch uses currentHeading to rotate pointer coordinates —
    // if it's non-zero the patch thinks the map is rotated and panning
    // goes in the wrong direction. In browsing mode the map is always
    // north-up so currentHeading must stay 0.
    // Use a separate unbounded accumulator just for the needle display.
    browsingNeedleHeading += shortestDelta(browsingNeedleHeading, raw);
    northArrow.style.transform = `rotate(${-browsingNeedleHeading}deg)`;
    // Ensure map stays north-up
    if (currentHeading !== 0 || targetHeading !== 0) {
      currentHeading = 0;
      targetHeading  = 0;
      mapWrapper.style.transform = 'rotate(0deg)';
    }
    return;
  }

  // Hiking mode — rotate the map
  targetHeading += shortestDelta(targetHeading, raw);

  if (!smoothingActive) {
    smoothingActive = true;
    smoothRotation();
  }
}

// iOS 13+ needs explicit permission on a user gesture.
// Android needs no permission but we still detect if events are firing.

let orientationPermissionGranted = false;
let orientationEventCount = 0;
let compassCheckTimer = null;

// showCompassBtn kept as no-op for safety (referenced in checkCompassOnHikingStart)
function showCompassBtn(show) { /* replaced by tap overlay */ }

function startOrientationListening() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // All iOS browsers — called inside tap gesture
    DeviceOrientationEvent.requestPermission()
      .then(response => {
        if (response === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation, true);
          orientationPermissionGranted = true;
          // Cache for Chrome/GSA so tap overlay is skipped on return visits
          if (isChromeLike) {
            try { localStorage.setItem('compassGranted', '1'); } catch(e) {}
          }
        }
      })
      .catch(err => console.warn('Compass permission error:', err));
  } else {
    // Android / desktop — no permission needed
    let gotAbsolute = false;
    window.addEventListener('deviceorientationabsolute', function(e) {
      gotAbsolute = true;
      handleOrientation(e);
    }, true);
    setTimeout(() => {
      if (!gotAbsolute) {
        window.addEventListener('deviceorientation', handleOrientation, true);
      }
    }, 500);
    orientationPermissionGranted = true;
  }
}

// iOS compass permission:
// requestPermission() MUST be called inside a user gesture on all iOS
// browsers — calling it outside a gesture silently fails or shows a
// system dialog. The tap overlay provides the required user gesture.
// iOS compass permission:
// All iOS browsers need requestPermission() inside a user gesture.
// Chrome/GSA resolve silently (no system dialog) and we cache the grant
// in localStorage so the tap overlay is skipped on return visits.
// Safari always requires the tap overlay + system dialog every session.
// Android/desktop: no permission needed.

const isChromeLike = /CriOS|GSA/.test(navigator.userAgent);
const compassCached = (() => {
  try { return localStorage.getItem('compassGranted') === '1'; } catch(e) { return false; }
})();

if (typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function') {
  if (isChromeLike && compassCached) {
    // Chrome/GSA previously granted — call requestPermission silently
    // (resolves without dialog for Chrome/GSA) to activate the sensor
    DeviceOrientationEvent.requestPermission()
      .then(response => {
        if (response === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation, true);
          orientationPermissionGranted = true;
        } else {
          // Permission revoked — clear cache and show overlay
          try { localStorage.removeItem('compassGranted'); } catch(e) {}
          showTapOverlay();
        }
      })
      .catch(() => showTapOverlay());
  } else {
    // First visit or Safari — show tap overlay
    showTapOverlay();
  }
} else {
  // Android / desktop — start immediately
  startOrientationListening();
}

function showTapOverlay() {
  const overlay = document.getElementById('tap-overlay');
  overlay.classList.remove('hidden');
  overlay.addEventListener('click', function onTap() {
    overlay.classList.add('hidden');
    overlay.removeEventListener('click', onTap);
    startOrientationListening();
  }, { once: true });
}

// Called from setMode() when hiking mode activates
function checkCompassOnHikingStart() {
  smoothingActive = false;
  browsingNeedleHeading = 0;  // reset so needle doesn't jump on mode switch
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function' &&
      !orientationPermissionGranted) {
    showTapOverlay();
  }
}

/* ═══════════════════════════════════════════════════════════════════
   FIX PINCH-ZOOM UNDER MAP ROTATION
   Placed here so currentHeading is already declared above.
   Patches Leaflet's TouchZoom handler after map is ready.
════════════════════════════════════════════════════════════════════ */
map.whenReady(function() {
  const tz = map.touchZoom;
  if (!tz) return;

  function makePinchSynth(e) {
    if (!currentHeading || !e.touches || e.touches.length < 2) return e;
    const cx  = window.innerWidth  * 0.5;
    const cy  = window.innerHeight * 0.75;
    const rad = currentHeading * Math.PI / 180;
    const cos = Math.cos(rad);
    const sin = Math.sin(rad);

    function rot(t) {
      const dx = t.clientX - cx, dy = t.clientY - cy;
      return {
        clientX:    cx + dx * cos - dy * sin,
        clientY:    cy + dx * sin + dy * cos,
        identifier: t.identifier,
        target:     t.target,
      };
    }

    // Build a proper array (not just object) so .length and iteration work
    const fake = Object.assign([rot(e.touches[0]), rot(e.touches[1])], { length: 2 });

    return new Proxy(e, {
      get(target, prop) {
        if (prop === 'touches') return fake;
        const val = target[prop];
        return typeof val === 'function' ? val.bind(target) : val;
      }
    });
  }

  // Track whether a pinch zoom is in progress
  let pinching = false;

  // Intercept map.setView during pinch — rotate the centre point back to
  // geographic space since Leaflet computed it in raw (unrotated) screen space
  const origSetView = map.setView.bind(map);
  map.setView = function(center, zoom, options) {
    if (pinching && currentHeading && center) {
      // center is a latlng — convert to container pixels, rotate, convert back
      const vmax = Math.max(window.innerWidth, window.innerHeight);
      const cw = 2 * vmax, ch = 2 * vmax;
      const originX = window.innerWidth  * 0.5 - cw * 0.5;
      const originY = window.innerHeight * 0.75 - ch * 0.5;

      const pt = map.latLngToContainerPoint(L.latLng(center));
      const sx = pt.x + originX;
      const sy = pt.y + originY;

      const cx  = window.innerWidth  * 0.5;
      const cy  = window.innerHeight * 0.75;
      const rad = -currentHeading * Math.PI / 180; // inverse rotation
      const cos = Math.cos(rad), sin = Math.sin(rad);
      const dx = sx - cx, dy = sy - cy;
      const rx = cx + dx * cos - dy * sin;
      const ry = cy + dx * sin + dy * cos;

      const rotated = map.containerPointToLatLng(
        L.point(rx - originX, ry - originY)
      );
      return origSetView(rotated, zoom, options);
    }
    return origSetView(center, zoom, options);
  };

  map.getContainer().addEventListener('touchstart', e => {
    if (e.touches.length === 2) pinching = true;
  }, { passive: true });
  map.getContainer().addEventListener('touchend', () => {
    pinching = false;
  }, { passive: true });

  const origStart = tz._onTouchStart.bind(tz);
  const origMove  = tz._onTouchMove.bind(tz);
  tz._onTouchStart = e => origStart(makePinchSynth(e));
  tz._onTouchMove  = e => origMove(makePinchSynth(e));
});

/* ═══════════════════════════════════════════════════════════════════
   TRAIL LEGEND
   Built from GeoJSON features where properties.description === 'legend'
   (case-insensitive). Shows trail name in trail color.
════════════════════════════════════════════════════════════════════ */
function buildLegend(geojsonData) {
  const entries = [];
  const seen = new Set();

  (geojsonData.features || []).forEach(f => {
    const p = f.properties || {};
    const desc = (p.description || '').trim().toLowerCase();
    if (desc !== 'legend') return;
    const title = (p.title || '').trim();
    const color = p.stroke || p['marker-color'] || '#888';
    if (!title || seen.has(title)) return;
    seen.add(title);
    entries.push({ title, color });
  });

  const container = document.getElementById('legend-entries');
  container.innerHTML = '';

  if (entries.length === 0) {
    // No legend entries — hide the button
    document.getElementById('legend-btn').style.display = 'none';
    return;
  }

  entries.forEach(({ title, color }) => {
    const row = document.createElement('div');
    row.className = 'legend-entry';
    const swatch = document.createElement('div');
    swatch.className = 'legend-swatch';
    swatch.style.background = color;
    const name = document.createElement('div');
    name.className = 'legend-name';
    name.textContent = title;
    name.style.color = color;
    row.appendChild(swatch);
    row.appendChild(name);
    container.appendChild(row);
  });
}

// Legend toggle
document.getElementById('legend-btn').addEventListener('click', () => {
  const panel = document.getElementById('legend-panel');
  const btn   = document.getElementById('legend-btn');
  const hidden = panel.classList.toggle('hidden');
  btn.classList.toggle('active', !hidden);
});
document.getElementById('legend-close').addEventListener('click', () => {
  document.getElementById('legend-panel').classList.add('hidden');
  document.getElementById('legend-btn').classList.remove('active');
});

  document.getElementById('feedback-overlay').classList.remove('hidden');
});

document.getElementById('feedback-close').addEventListener('click', () => {
  document.getElementById('feedback-overlay').classList.add('hidden');
});

// Close on backdrop tap
document.getElementById('feedback-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('feedback-overlay')) {
    document.getElementById('feedback-overlay').classList.add('hidden');
  }
});

document.getElementById('feedback-message').addEventListener('input', e => {
  document.getElementById('feedback-submit').disabled = e.target.value.trim() === '';
});


document.getElementById('feedback-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('feedback-submit');
  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    const response = await fetch('https://formspree.io/f/xreoyjyz', {
      method: 'POST',
      headers: { 'Accept': 'application/json' },
      body: new FormData(e.target),
    });
    const json = await response.json().catch(() => ({}));
    if (response.ok) {
      document.getElementById('feedback-form').classList.add('hidden');
      document.getElementById('feedback-thankyou').classList.remove('hidden');
      setTimeout(() => {
        document.getElementById('feedback-overlay').classList.add('hidden');
      }, 2500);
    } else {
      const reason = json.error || json.errors?.[0]?.message || `Error ${response.status}`;
      showToast(`Could not send: ${reason}`, 5000);
      btn.textContent = 'Send Feedback';
      btn.disabled = false;
    }
  } catch (err) {
    showToast(`Could not send: ${err.message}`, 5000);
    btn.textContent = 'Send Feedback';
    btn.disabled = false;
  }
});
