<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Trail Navigator</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --green:   #3fb950;
      --blue:    #58a6ff;
      --orange:  #f0883e;
    }

    html, body {
      height: 100%; width: 100%;
      /* dvh = dynamic viewport height, accounts for browser chrome on mobile */
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
    }

    #map-rotate-wrapper {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      transform-origin: center center;
      transform: scale(2);
      will-change: transform;
      z-index: 1;
    }

    #map {
      width: 100%; height: 100%;
    }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      /* Use dvh so overlay matches actual visible browser height */
      height: 100dvh;
      z-index: 1000;
      pointer-events: none;
    }
    #ui-overlay > * { pointer-events: auto; }

    /* ── TOP BAR ── */
    #top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
    }

    #park-name {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #mode-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1.5px solid;
      transition: all 0.4s;
      white-space: nowrap;
    }
    #mode-badge.hiking  { color: var(--green);  border-color: var(--green);  background: rgba(63,185,80,0.12); }
    #mode-badge.browsing{ color: var(--blue);   border-color: var(--blue);   background: rgba(88,166,255,0.12); }

    /* ── NORTH ARROW (top-right, visible in hiking mode) ── */
    #north-arrow {
      position: absolute;
      top: 66px; right: 12px;
      width: 48px; height: 48px;
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease-out, opacity 0.3s;
    }
    #north-arrow.hidden { opacity: 0; pointer-events: none; }

    /* ── RECENTER BUTTON (appears when user pans in hiking mode) ── */
    #recenter-btn {
      position: absolute;
      bottom: 90px; right: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(13,17,23,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--green);
      border: 1px solid rgba(63,185,80,0.4);
      border-radius: 20px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.2s;
    }
    #recenter-btn:active { transform: scale(0.95); }
    #recenter-btn.hidden { display: none; }

    /* ── BOTTOM BAR ── */
    #bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 8px 12px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #layer-group {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .layer-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 13px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .layer-btn:not(:last-child) { border-right: 1px solid var(--border); }
    .layer-btn.active { background: var(--green); color: #000; }

    /* Find Me / Go to Park — only shown in browsing mode */
    #locate-btn {
      flex: 1;
      background: var(--blue);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 14px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, opacity 0.2s;
    }
    #locate-btn:active { opacity: 0.75; }
    #locate-btn.go-park { background: var(--orange); }
    #locate-btn.hidden  { display: none; }

    #zoom-badge {
      position: absolute;
      top: 102px; left: 12px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      z-index: 2000;
      pointer-events: none;
    }

    /* ── COMPASS PERMISSION BUTTON ── */
    #compass-btn-wrap {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
    }
    #compass-btn-wrap.hidden { display: none; }
    #compass-perm-btn {
      background: rgba(13,17,23,0.92);
      color: var(--green);
      border: 1.5px solid var(--green);
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space: nowrap;
    }
    #compass-perm-btn:active { opacity: 0.75; }

    /* ── VERSION BADGE ── */
    #version-badge {
      position: absolute;
      top: 60px; left: 12px;
      background: #ff0080;
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      padding: 4px 10px;
      border-radius: 8px;
      z-index: 2000;
      letter-spacing: 0.05em;
    }

    /* ── STATUS TOAST ── */
    #status-toast {
      position: absolute;
      top: 64px; left: 50%;
      transform: translateX(-50%);
      background: rgba(22,27,34,0.93);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-size: 12px;
      padding: 5px 14px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.6s;
    }
    #status-toast.hidden { opacity: 0; }

    /* ── USER LOCATION DOT ── */
    .user-dot-wrap {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(88,166,255,0.22);
      display: flex; align-items: center; justify-content: center;
      animation: gpulse 2.2s infinite;
      will-change: transform;
      transform: translateZ(0);
    }
    .user-dot-inner {
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #58a6ff;
      border: 2.5px solid #fff;
      box-shadow: 0 0 6px rgba(88,166,255,0.8);
      will-change: transform;
      transform: translateZ(0);
    }
    @keyframes gpulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(88,166,255,0.45); }
      55%      { box-shadow: 0 0 0 9px rgba(88,166,255,0); }
    }


    .leaflet-control-attribution {
      background: rgba(13,17,23,0.75) !important;
      color: var(--muted) !important;
      font-size: 10px !important;
    }
    .leaflet-control-attribution a { color: var(--blue) !important; }

    /* Hide default zoom (we use our own +/- via the map's built-in zoom ctrl) */
    .leaflet-control-zoom a {
      background: rgba(22,27,34,0.92) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface) !important; }

    /* ── Trail name label ── */
    .trail-name-label {
      font-size: 7px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 4px #fff,
                   1px 1px 0 #fff, -1px -1px 0 #fff;
      opacity: 0.9;
      pointer-events: none;
      transform-origin: center center;
    }

    /* ── POI permanent label ── */
    .poi-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      color: #000 !important;
      font-size: 8px !important;
      font-weight: 600 !important;
      line-height: 1.05 !important;
      padding: 0 !important;
      max-width: 60px !important;
      white-space: normal !important;
      word-wrap: break-word !important;
      text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff !important;
    }
    .poi-label::before { display: none !important; }
    .poi-label-hidden  { display: none !important; }

  </style>
</head>
<body>

<!-- ═══ ROTATION WRAPPER — only this div gets rotated ═══ -->
<div id="map-rotate-wrapper">
  <div id="map"></div>
</div>

<!-- ═══ UI OVERLAY — never rotates ═══ -->
<div id="ui-overlay">

  <div id="top-bar">
    <div id="park-name">🥾 Trail Navigator</div>
    <div id="mode-badge" class="browsing">Browsing</div>
  </div>

  <div id="version-badge">v32</div>
  <div id="zoom-badge"></div>

  <div id="status-toast" class="hidden">Ready</div>

  <!-- North arrow: counter-rotates to always point true north -->
  <div id="north-arrow" class="hidden">
    <svg viewBox="0 0 40 40" width="36" height="36">
      <polygon points="20,4 26,20 20,17 14,20" fill="#e74c3c"/>
      <polygon points="20,36 26,20 20,23 14,20" fill="#888"/>
      <text x="20" y="12" text-anchor="middle" fill="white"
            font-size="7" font-family="sans-serif" font-weight="700">N</text>
    </svg>
  </div>

  <!-- Recenter button: appears when user pans away in hiking mode -->
  <button id="recenter-btn" class="hidden" onclick="recenterToUser()">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
         stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2"  x2="12" y2="7"/>
      <line x1="12" y1="17" x2="12" y2="22"/>
      <line x1="2"  y1="12" x2="7"  y2="12"/>
      <line x1="17" y1="12" x2="22" y2="12"/>
    </svg>
    Return to Me
  </button>

  <!-- Compass permission button — shown when orientation permission not yet granted -->
  <div id="compass-btn-wrap" class="hidden">
    <button id="compass-perm-btn">🧭 Enable Compass</button>
  </div>

  <div id="bottom-bar">
    <div id="layer-group">
      <button class="layer-btn"        data-layer="map">Map</button>
      <button class="layer-btn"        data-layer="topo">Topo</button>
      <button class="layer-btn active" data-layer="sat">Sat</button>
    </div>
    <button id="locate-btn">Find Me</button>
  </div>

</div><!-- end #ui-overlay -->

<script>
/* ═══════════════════════════════════════════════════════════════════
   PARK CONFIGURATION
   Add more parks here. geojsonUrl = relative path or full URL.
════════════════════════════════════════════════════════════════════ */
const PARKS = [
  {
    id:            'trail-park-1',
    name:          'Trail Park',
    geojsonUrl:    'trails.geojson',
    // If user is within this many metres of the park centre → Hiking mode.
    // Use a large number (e.g. 999999) to force Hiking mode while testing.
    hikingRadius:  90000,
    defaultZoom:   17,
    hikingZoom:    19,    // zoom level when following user on foot
    defaultCenter: null,           // null = auto-computed from GeoJSON bounds
  }
];

/* ═══════════════════════════════════════════════════════════════════
   TILE LAYERS
════════════════════════════════════════════════════════════════════ */
const TILE_DEFS = {
  map:  { url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
          opts: { attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 22 } },
  topo: { url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
          opts: { attribution: '© <a href="https://opentopomap.org">OpenTopoMap</a>', maxZoom: 22, maxNativeZoom: 17 } },
  sat:  { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
          opts: { attribution: '© <a href="https://www.esri.com">Esri</a>', maxZoom: 22, maxNativeZoom: 19 } },
};

/* ═══════════════════════════════════════════════════════════════════
   TIMING
════════════════════════════════════════════════════════════════════ */
const RECENTER_DELAY_MS = 4000;
const ZOOM_RETURN_MS    = 5000;
const TOAST_MS          = 2500;

/* ═══════════════════════════════════════════════════════════════════
   APP STATE
════════════════════════════════════════════════════════════════════ */
const S = {
  park:         PARKS[0],
  isHiking:     false,
  isTracking:   false,   // map follows user
  userMovedMap: false,   // user has manually panned/zoomed
  userLatLng:   null,
  hasCentered:  false,   // have we done the first setView to user?
  parkCenter:   null,
  parkBounds:   null,
  defaultZoom:  PARKS[0].defaultZoom,
  hikingZoom:   PARKS[0].hikingZoom,
  recenterTimer: null,
  zoomTimer:    null,
};

// Also expose isHiking on window so orientation code can read it
window.isHikingMode = false;

/* ═══════════════════════════════════════════════════════════════════
   MAP INIT
════════════════════════════════════════════════════════════════════ */
const map = L.map('map', { zoomControl: true, attributionControl: true });

let activeTileLayer = null;
function setTileLayer(name) {
  if (activeTileLayer) map.removeLayer(activeTileLayer);
  const d = TILE_DEFS[name];
  activeTileLayer = L.tileLayer(d.url, d.opts).addTo(map);
  document.querySelectorAll('.layer-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.layer === name)
  );
}
setTileLayer('sat');

function updateZoomBadge() {
  const el = document.getElementById('zoom-badge');
  if (el) el.textContent = 'zoom: ' + map.getZoom();
}

/* ═══════════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg, ms = TOAST_MS) {
  const el = document.getElementById('status-toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(toastTimer);
  if (ms > 0) toastTimer = setTimeout(() => el.classList.add('hidden'), ms);
}


function styleForLine(p) {
  return {
    color:    p.stroke            || '#FF0000',
    weight:   (p['stroke-width']  ?? 2) + 1,
    opacity:  p['stroke-opacity'] ?? 0.9,
    lineCap: 'round', lineJoin: 'round',
  };
}
function styleForPolygon(p) {
  return {
    color:       p.stroke            || '#00cd00',
    weight:      p['stroke-width']   ?? 2,
    opacity:     p['stroke-opacity'] ?? 0.8,
    fillColor:   p.fill              || p.stroke || '#00cd00',
    fillOpacity: p['fill-opacity']   ?? 0.15,
  };
}
function makePOIIcon(p) {
  const c = p.stroke || '#e05c2a';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="10" height="13" viewBox="0 0 26 34">
    <path d="M13 0C5.82 0 0 5.82 0 13c0 8.66 13 21 13 21S26 21.66 26 13C26 5.82 20.18 0 13 0z" fill="${c}" opacity="0.92"/>
    <circle cx="13" cy="13" r="5.5" fill="white" opacity="0.88"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '',
    iconSize: [10,13], iconAnchor: [5,13], popupAnchor: [0,-13] });
}

/* ═══════════════════════════════════════════════════════════════════
   TRAIL LABELS
   One centred label per named trail, rotated to follow the line.
════════════════════════════════════════════════════════════════════ */
let trailLabelLayer = null;
const TRAIL_LABEL_MIN_ZOOM = 15;  // hide labels when zoomed out

// Get the coordinate at the midpoint of a LineString coordinate array
function lineMidpoint(coords) {
  // Calculate total length, then walk to the halfway point
  let total = 0;
  for (let i = 1; i < coords.length; i++) {
    const dx = coords[i][0] - coords[i-1][0];
    const dy = coords[i][1] - coords[i-1][1];
    total += Math.sqrt(dx*dx + dy*dy);
  }
  let half = total / 2;
  for (let i = 1; i < coords.length; i++) {
    const dx = coords[i][0] - coords[i-1][0];
    const dy = coords[i][1] - coords[i-1][1];
    const seg = Math.sqrt(dx*dx + dy*dy);
    if (half <= seg) {
      const t = half / seg;
      return [coords[i-1][0] + dx*t, coords[i-1][1] + dy*t];
    }
    half -= seg;
  }
  return coords[Math.floor(coords.length / 2)];
}

// Get the bearing angle (degrees) at the midpoint of a coordinate array
// Uses projected pixel coordinates so the angle matches what appears on screen
function lineAngleAtMid(coords) {
  const n = coords.length;
  const ai = Math.max(0, Math.floor(n * 0.4));
  const bi = Math.min(n - 1, Math.floor(n * 0.6));
  // Convert lng/lat to pixel coords at current zoom so aspect ratio is correct
  const a = map.latLngToContainerPoint(L.latLng(coords[ai][1], coords[ai][0]));
  const b = map.latLngToContainerPoint(L.latLng(coords[bi][1], coords[bi][0]));
  let angle = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
  // Keep text right-side up
  if (angle > 90)  angle -= 180;
  if (angle < -90) angle += 180;
  return angle;
}

function buildTrailLabels(geojsonData) {
  if (trailLabelLayer) map.removeLayer(trailLabelLayer);
  trailLabelLayer = L.layerGroup();
  const seen = new Set();

  geojsonData.features.forEach(f => {
    const p = f.properties || {};
    const t = f.geometry.type;
    if (t !== 'LineString' && t !== 'MultiLineString') return;

    const title = (p.title || '').trim();
    const isTS  = /^\d{1,2}:\d{2}:\d{2}/.test(title);
    if (!title || isTS) return;
    if (seen.has(title)) return;  // one label per unique trail name
    seen.add(title);

    const coords = t === 'LineString'
      ? f.geometry.coordinates
      : f.geometry.coordinates[0];  // first segment of MultiLineString

    const mid   = lineMidpoint(coords);
    const angle = lineAngleAtMid(coords);
    const color = p.stroke || '#333';

    const latlng = L.latLng(mid[1], mid[0]);
    const html = `<div class="trail-name-label" style="transform:rotate(${angle}deg);color:${color};">${title}</div>`;
    const marker = L.marker(latlng, {
      icon: L.divIcon({ html, className: '', iconSize: [60, 12], iconAnchor: [30, 6] }),
      interactive: false,
      zIndexOffset: -100,
    });
    trailLabelLayer.addLayer(marker);
  });

  trailLabelLayer.addTo(map);
  updateTrailLabelVisibility();
}

function updateTrailLabelVisibility() {
  if (!trailLabelLayer) return;
  const show = map.getZoom() >= TRAIL_LABEL_MIN_ZOOM;
  trailLabelLayer.eachLayer(layer => {
    if (layer._icon) layer._icon.style.display = show ? '' : 'none';
  });
}

let geojsonLayer = null;
let lastGeojsonData = null;  // kept so trail labels can be rebuilt on zoom
const poiLayers = [];   // all Point marker layers, for zoom-based label toggling

// Labels visible at this zoom level and above
const POI_LABEL_MIN_ZOOM = 17;
// Icons visible at this zoom level and above (a bit lower than labels)
const POI_ICON_MIN_ZOOM  = 15;

function updatePoiLabelVisibility() {
  const zoom      = map.getZoom();
  const showLabel = zoom >= POI_LABEL_MIN_ZOOM;
  const showIcon  = zoom >= POI_ICON_MIN_ZOOM;
  poiLayers.forEach(layer => {
    // Toggle label
    const tt = layer.getTooltip();
    if (tt) {
      const el = tt.getElement();
      if (el) el.classList.toggle('poi-label-hidden', !showLabel);
    }
    // Toggle icon
    if (layer._icon) {
      layer._icon.style.display = showIcon ? '' : 'none';
    }
  });
}

map.on('zoomend', () => {
  updateZoomBadge();
  updatePoiLabelVisibility();
  updateTrailLabelVisibility();
  if (lastGeojsonData) buildTrailLabels(lastGeojsonData);
});
function loadPark(park) {
  showToast('Loading trail data…', 0);
  fetch(park.geojsonUrl)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      if (geojsonLayer) map.removeLayer(geojsonLayer);
      poiLayers.length = 0;  // clear on reload
      geojsonLayer = L.geoJSON(data, {
        style: f => {
          const p = f.properties || {}, t = f.geometry.type;
          if (t === 'LineString'  || t === 'MultiLineString') return styleForLine(p);
          if (t === 'Polygon'     || t === 'MultiPolygon')    return styleForPolygon(p);
          return {};
        },
        pointToLayer: (f, ll) => {
          const marker = L.marker(ll, { icon: makePOIIcon(f.properties || {}) });
          poiLayers.push(marker);
          return marker;
        },
        onEachFeature: (f, layer) => {
          const p = f.properties || {}, t = f.geometry.type;
          const title = (p.title || '').trim();
          const isTS  = /^\d{1,2}:\d{2}:\d{2}/.test(title);
          const cleanTitle = isTS ? '' : title;

          if (t === 'Point') {
            // Permanent label beside the pin — no popup
            if (cleanTitle) {
              layer.bindTooltip(cleanTitle, {
                permanent:  true,
                direction:  'right',
                offset:     [2, -4],
                className:  'poi-label',
              });
            }
          } else if (t === 'LineString' || t === 'MultiLineString') {
            // No tooltip — trail names are shown as rotated labels via buildTrailLabels()
          }
        },
      }).addTo(map);

      S.parkBounds = geojsonLayer.getBounds();
      if (S.parkBounds.isValid()) {
        S.parkCenter = park.defaultCenter
          ? L.latLng(park.defaultCenter[0], park.defaultCenter[1])
          : S.parkBounds.getCenter();
        // Open on the park overview — no fly-to-user until GPS arrives
        map.fitBounds(S.parkBounds, { padding: [50, 50], animate: false });
        setTimeout(() => {
        S.defaultZoom = map.getZoom();
        updateZoomBadge();
      }, 300);
      }

      // Use name from GeoJSON if present, otherwise fall back to config name
      const parkName = data.name || park.name;
      document.getElementById('park-name').textContent = '🥾 ' + parkName;
      lastGeojsonData = data;
      showToast('Trails loaded ✓');
      // Trail labels disabled — revisit later
      // buildTrailLabels(data);
      setTimeout(updatePoiLabelVisibility, 800);
      startGeolocation();
    })
    .catch(err => {
      console.error('GeoJSON error:', err);
      showToast('⚠️ Could not load trail data', 0);
    });
}

/* ═══════════════════════════════════════════════════════════════════
   USER MARKER
════════════════════════════════════════════════════════════════════ */
let userMarker = null;
function placeOrMoveUser(latlng) {
  if (!userMarker) {
    const wrap = document.createElement('div');
    wrap.className = 'user-dot-wrap';
    wrap.innerHTML = '<div class="user-dot-inner"></div>';
    userMarker = L.marker(latlng, {
      icon: L.divIcon({ html: wrap, className: '', iconSize: [24,24], iconAnchor: [12,12] }),
      zIndexOffset: 1000, interactive: false,
    }).addTo(map);
  } else {
    userMarker.setLatLng(latlng);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   DISTANCE HELPER
════════════════════════════════════════════════════════════════════ */
function metreBetween(lat1, lon1, lat2, lon2) {
  const R = 6371000, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ═══════════════════════════════════════════════════════════════════
   MODE MANAGEMENT
════════════════════════════════════════════════════════════════════ */
function setMode(mode) {
  const hiking    = mode === 'hiking';
  const wasHiking = S.isHiking;
  S.isHiking      = hiking;
  window.isHikingMode = hiking;

  const badge   = document.getElementById('mode-badge');
  const locBtn  = document.getElementById('locate-btn');
  const arrow   = document.getElementById('north-arrow');
  const wrapper = document.getElementById('map-rotate-wrapper');

  if (hiking) {
    badge.textContent = '⛰ Hiking';
    badge.className   = 'hiking';
    locBtn.classList.add('hidden');
    arrow.classList.remove('hidden');
    // Only reset follow state on the transition into hiking mode
    if (!wasHiking) {
      S.userMovedMap = false;
      showRecenterBtn(false);
      checkCompassOnHikingStart();
    }
  } else {
    badge.textContent = '🗺 Browsing';
    badge.className   = 'browsing';
    locBtn.classList.remove('hidden');
    arrow.classList.add('hidden');
    showCompassBtn(false);
    clearTimeout(compassCheckTimer);
    wrapper.style.transform = 'scale(2) rotate(0deg)';
    window.mapRotationDeg   = 0;
    currentHeading = 0;
    targetHeading  = 0;
  }
}

/* ═══════════════════════════════════════════════════════════════════
   OFFSET PAN — keeps user dot at 3/4 down the screen in hiking mode.
   Works by converting the target latlng to a pixel point, shifting it
   up by 25% of screen height, then converting back to latlng and
   using a plain panTo. No secondary panBy, no padding options.
════════════════════════════════════════════════════════════════════ */
function panToUser(latlng, animate) {
  map.panTo(latlng, { animate: animate !== false, duration: 0.5 });
}

/* ═══════════════════════════════════════════════════════════════════
   RECENTER LOGIC
════════════════════════════════════════════════════════════════════ */
function showRecenterBtn(show) {
  document.getElementById('recenter-btn').classList.toggle('hidden', !show);
}

function recenterToUser() {
  if (!S.userLatLng) return;
  map.setView(S.userLatLng, Math.max(map.getZoom(), S.hikingZoom), { animate: true });
  S.userMovedMap = false;
  showRecenterBtn(false);
  clearTimeout(S.recenterTimer);
}

function resetRecenterTimer() {
  clearTimeout(S.recenterTimer);
  if (S.isHiking && S.userMovedMap) {
    S.recenterTimer = setTimeout(() => {
      if (S.userMovedMap && S.isHiking) recenterToUser();
    }, RECENTER_DELAY_MS);
  }
}

/* ═══════════════════════════════════════════════════════════════════
   MAP DRAG / ZOOM — detect manual interaction
════════════════════════════════════════════════════════════════════ */
map.on('dragstart', () => {
  S.userMovedMap = true;
  if (S.isHiking) showRecenterBtn(true);
  resetRecenterTimer();
});
map.on('drag',    resetRecenterTimer);
map.on('dragend', resetRecenterTimer);
map.on('zoomstart', e => {
  if (e.originalEvent) {   // only user-initiated zooms
    S.userMovedMap = true;
    if (S.isHiking) showRecenterBtn(true);
    resetRecenterTimer();
  }
});

/* ═══════════════════════════════════════════════════════════════════
   GEOLOCATION
════════════════════════════════════════════════════════════════════ */

// Minimum movement thresholds to filter GPS jitter
const MIN_MOVE_METRES_DOT    = 1;   // below this, don't even move the dot
const MIN_MOVE_METRES_FOLLOW = 3;   // below this, don't pan the map

function startGeolocation() {
  if (!navigator.geolocation) {
    showToast('Geolocation not supported');
    setMode('browsing');
    return;
  }
  showToast('Requesting location…', 0);

  navigator.geolocation.watchPosition(
    pos => {
      const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);

      // Jitter filter
      const prevLatLng    = S.userLatLng;
      const movedMetres   = prevLatLng
        ? metreBetween(prevLatLng.lat, prevLatLng.lng, latlng.lat, latlng.lng)
        : Infinity;

      S.userLatLng = latlng;

      // Move the dot if position changed meaningfully
      if (movedMetres >= MIN_MOVE_METRES_DOT) {
        placeOrMoveUser(latlng);
      }

      // Mode detection (only once park centre is known)
      if (S.parkCenter) {
        const dist      = metreBetween(latlng.lat, latlng.lng, S.parkCenter.lat, S.parkCenter.lng);
        const shouldHike = dist <= S.park.hikingRadius;
        const wasHiking  = S.isHiking;
        setMode(shouldHike ? 'hiking' : 'browsing');

        // First time entering hiking mode — snap to user at hiking zoom
        if (shouldHike && !wasHiking && !S.hasCentered) {
          S.hasCentered = true;
          map.setView(latlng, S.hikingZoom, { animate: true });
          return;  // skip the regular follow this tick
        }
      }

      // Regular GPS follow — pan map every update when hiking and not manually panned
      // Also follow in browse mode when user has pressed Find Me (isTracking)
      const shouldFollow = (S.isHiking && !S.userMovedMap) ||
                           (!S.isHiking && S.isTracking);
      if (shouldFollow && movedMetres >= MIN_MOVE_METRES_FOLLOW) {
        panToUser(latlng, true);
      }

      const acc = pos.coords.accuracy ? `± ${Math.round(pos.coords.accuracy)}m` : '';
      showToast(`📍 Located ${acc}`);
    },
    err => {
      console.warn('GPS error:', err.message);
      showToast('📍 Location unavailable — Browsing mode');
      setMode('browsing');
    },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
  );
}

/* ═══════════════════════════════════════════════════════════════════
   FIND ME / GO TO PARK BUTTON  (browsing mode only)
════════════════════════════════════════════════════════════════════ */
document.getElementById('locate-btn').addEventListener('click', () => {
  const btn = document.getElementById('locate-btn');
  if (S.isTracking) {
    // "Go to Park" — stop tracking, fly back to park
    S.isTracking = false;
    btn.textContent = 'Find Me';
    btn.classList.remove('go-park');
    if (S.parkBounds && S.parkBounds.isValid()) {
      map.fitBounds(S.parkBounds, { padding: [50,50], animate: true });
    }
  } else {
    // "Find Me" — fly to user and start following
    if (S.userLatLng) {
      S.isTracking   = true;
      S.userMovedMap = false;
      btn.textContent = 'Go to Park';
      btn.classList.add('go-park');
      map.setView(S.userLatLng, Math.max(map.getZoom(), S.hikingZoom), { animate: true });
      // While isTracking in browse mode, pan on each GPS update
    } else {
      showToast('Waiting for location…');
    }
  }
});

document.querySelectorAll('.layer-btn').forEach(btn =>
  btn.addEventListener('click', () => setTileLayer(btn.dataset.layer))
);

/* ═══════════════════════════════════════════════════════════════════
   FIX PANNING UNDER MAP ROTATION
   Problem: The map wrapper is CSS-rotated, but Leaflet's drag handler
   computes deltas in raw screen pixels. Those screen pixels don't align
   with map axes when rotated, so panning goes the wrong direction.

   Fix: Hook into Leaflet's Draggable after map init. Before Leaflet
   records each pointer position, rotate the pointer coordinates by
   +heading around the map centre. This makes Leaflet "see" pointer
   movement as if the map were north-up, so its delta math is correct.

   We rotate the pointer, not the delta, because Leaflet's Draggable
   stores absolute positions and diffs them internally.
════════════════════════════════════════════════════════════════════ */
map.whenReady(function() {
  const draggable = map.dragging._draggable;
  if (!draggable) return;

  // Rotate a screen point around the map container centre by `deg` degrees
  function rotatePointAroundCenter(x, y, deg) {
    const container = map.getContainer();
    const cx = container.offsetWidth  / 2;
    const cy = container.offsetHeight / 2;
    const rad = deg * Math.PI / 180;
    const cos = Math.cos(rad);
    const sin = Math.sin(rad);
    const dx  = x - cx;
    const dy  = y - cy;
    return {
      x: cx + dx * cos - dy * sin,
      y: cy + dx * sin + dy * cos,
    };
  }

  function makeSynth(e, clientX, clientY) {
    return new Proxy(e, {
      get(target, prop) {
        if (prop === 'clientX') return clientX;
        if (prop === 'clientY') return clientY;
        if (prop === 'touches') return [{
          clientX, clientY,
          identifier: e.touches ? e.touches[0].identifier : 0,
          target: e.touches ? e.touches[0].target : e.target,
        }];
        if (prop === 'changedTouches') return [{
          clientX, clientY,
          identifier: e.changedTouches ? e.changedTouches[0].identifier : 0,
          target: e.changedTouches ? e.changedTouches[0].target : e.target,
        }];
        const val = target[prop];
        return typeof val === 'function' ? val.bind(target) : val;
      }
    });
  }

  // Leaflet updates _startPoint on every move (it's a running reference),
  // so we cannot use _startPoint changes to detect new drags.
  // Instead we track the raw touch/mouse position: a jump > 20px means
  // the finger was lifted and a new drag began.

  let lastRawX = null;
  let lastRawY = null;
  let rotatedStartX = null;
  let rotatedStartY = null;

  const origOnMove = draggable._onMove.bind(draggable);
  draggable._onMove = function(e) {
    const h = currentHeading;
    if (!h) { origOnMove(e); return; }

    let rawX, rawY;
    if (e.touches && e.touches.length > 0) {
      rawX = e.touches[0].clientX;
      rawY = e.touches[0].clientY;
    } else {
      rawX = e.clientX;
      rawY = e.clientY;
    }

    // Detect new drag: finger jumped more than 20px from last known position
    const isNewDrag = lastRawX === null ||
      Math.abs(rawX - lastRawX) > 20 ||
      Math.abs(rawY - lastRawY) > 20;

    if (isNewDrag) {
      const sp = draggable._startPoint;
      if (sp) {
        const r = rotatePointAroundCenter(sp.x, sp.y, h);
        rotatedStartX = r.x;
        rotatedStartY = r.y;
        draggable._startPoint = L.point(rotatedStartX, rotatedStartY);
      }
    } else {
      if (rotatedStartX !== null) {
        draggable._startPoint = L.point(rotatedStartX, rotatedStartY);
      }
    }

    lastRawX = rawX;
    lastRawY = rawY;

    const rot = rotatePointAroundCenter(rawX, rawY, h);
    origOnMove(makeSynth(e, rot.x, rot.y));
  };

  // Reset on drag end so next drag is detected correctly
  map.on('dragend', function() {
    lastRawX = null;
    lastRawY = null;
    rotatedStartX = null;
    rotatedStartY = null;
  });
});


/* ═══════════════════════════════════════════════════════════════════
   COMPASS / MAP ROTATION
   Rotates #map-rotate-wrapper. UI overlay never rotates.
   Uses UNBOUNDED heading float to prevent wrap-around spin.
════════════════════════════════════════════════════════════════════ */
const mapWrapper = document.getElementById('map-rotate-wrapper');
const northArrow = document.getElementById('north-arrow');

let currentHeading  = 0;   // unbounded — never normalize to [0,360)
let targetHeading   = 0;   // unbounded
let smoothingActive = false;

function shortestDelta(from, to) {
  return ((to - from + 540) % 360) - 180;
}

function applyRotation(heading) {
  mapWrapper.style.transform = `scale(2) rotate(${-heading}deg)`;
  // The arrow lives in the un-rotated UI overlay. When the map rotates
  // -heading degrees, north on screen has shifted -heading degrees from
  // straight up, so the needle must rotate -heading to point back at north.
  northArrow.style.transform = `rotate(${-heading}deg)`;
  window.mapRotationDeg = ((heading % 360) + 360) % 360;
}

function smoothRotation() {
  const delta = targetHeading - currentHeading;
  if (Math.abs(delta) < 1.5) {   // dead zone: ignore sub-1.5° jitter
    currentHeading = targetHeading;
    applyRotation(currentHeading);
    smoothingActive = false;
    return;
  }
  currentHeading += delta * 0.15;
  applyRotation(currentHeading);
  requestAnimationFrame(smoothRotation);
}

function handleOrientation(e) {
  orientationEventCount++;
  if (orientationEventCount === 1) showCompassBtn(false);

  if (!window.isHikingMode) {
    if (currentHeading !== 0 || targetHeading !== 0) {
      targetHeading = currentHeading;
      applyRotation(0);
      currentHeading = 0; targetHeading = 0;
    }
    return;
  }

  let raw;
  if (typeof e.webkitCompassHeading === 'number' && e.webkitCompassHeading >= 0) {
    // iOS: webkitCompassHeading is clockwise degrees from true north — use directly
    raw = e.webkitCompassHeading;
  } else if (e.absolute && e.alpha != null) {
    // Android deviceorientationabsolute: alpha is CCW from true north, convert to CW
    raw = (360 - e.alpha) % 360;
  } else if (e.alpha != null) {
    // Android fallback deviceorientation: alpha is CCW from arbitrary reference
    raw = (360 - e.alpha) % 360;
  } else {
    return;
  }

  targetHeading += shortestDelta(targetHeading, raw);

  if (!smoothingActive) {
    smoothingActive = true;
    smoothRotation();
  }
}

// iOS 13+ needs explicit permission on a user gesture.
// Android needs no permission but we still detect if events are firing.

let orientationPermissionGranted = false;
let orientationEventCount = 0;
let compassCheckTimer = null;

function showCompassBtn(show) {
  document.getElementById('compass-btn-wrap').classList.toggle('hidden', !show);
}

function startOrientationListening() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS — uses deviceorientation which provides webkitCompassHeading (true north)
    window.addEventListener('deviceorientation', handleOrientation, true);
  } else {
    // Android — prefer deviceorientationabsolute (true north referenced).
    // Fall back to deviceorientation only if absolute never fires.
    let gotAbsolute = false;

    window.addEventListener('deviceorientationabsolute', function(e) {
      gotAbsolute = true;
      handleOrientation(e);
    }, true);

    setTimeout(() => {
      if (!gotAbsolute) {
        // Device doesn't support absolute — fall back, north may be approximate
        window.addEventListener('deviceorientation', handleOrientation, true);
      }
    }, 500);  // 500ms is enough — absolute fires immediately if supported
  }

  orientationPermissionGranted = true;
  showCompassBtn(false);

  // After 3 seconds check if we're actually receiving events
  clearTimeout(compassCheckTimer);
  compassCheckTimer = setTimeout(() => {
    if (orientationEventCount === 0 && S.isHiking) {
      showCompassBtn(true);
    }
  }, 3000);
}

function requestCompassPermission() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+
    DeviceOrientationEvent.requestPermission()
      .then(response => {
        if (response === 'granted') {
          startOrientationListening();
          showToast('Compass enabled ✓');
        } else {
          showToast('Compass permission denied');
          showCompassBtn(true);
        }
      })
      .catch(err => {
        console.warn('Compass permission error:', err);
        showToast('Compass unavailable');
      });
  } else {
    // Android / desktop — no permission needed
    startOrientationListening();
  }
}

// Compass button tap
document.getElementById('compass-perm-btn').addEventListener('click', requestCompassPermission);

// Android/desktop: start immediately (no permission needed)
// iOS: wait for button tap — requestPermission requires a direct user gesture
if (typeof DeviceOrientationEvent === 'undefined' ||
    typeof DeviceOrientationEvent.requestPermission !== 'function') {
  startOrientationListening();
}

// Called from setMode() when hiking mode activates
function checkCompassOnHikingStart() {
  // Reset smoothing so the RAF loop restarts cleanly on next orientation event
  smoothingActive = false;

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS — show button if permission not yet granted
    if (!orientationPermissionGranted) {
      showCompassBtn(true);
    }
  }

  // Check after 3s whether events are actually arriving
  clearTimeout(compassCheckTimer);
  compassCheckTimer = setTimeout(() => {
    if (orientationEventCount === 0 && S.isHiking) {
      showCompassBtn(true);
    }
  }, 3000);
}

/* ═══════════════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════════════════ */
loadPark(S.park);
</script>
</body>
