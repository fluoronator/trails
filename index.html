<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Orientation Map</title>

<!-- Leaflet (open source) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
}

#map {
    height: 100%;
    width: 100%;
    transition: transform 0.15s linear;
}

/* Clean mobile look */
.leaflet-control-zoom {
    display: none;
}
</style>
</head>
<body>

<div id="map"></div>

<script>
let map = L.map('map', {
    zoomControl: false,
    attributionControl: false
}).setView([0,0], 18);

// OpenStreetMap (free, no key required)
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

// Blue location dot
let userMarker = L.circleMarker([0,0], {
    radius: 8,
    color: '#fff',
    weight: 2,
    fillColor: '#007aff',
    fillOpacity: 1
}).addTo(map);

// Accuracy circle
let accuracyCircle = L.circle([0,0], {
    radius: 0,
    color: '#007aff',
    fillColor: '#007aff',
    fillOpacity: 0.15,
    weight: 1
}).addTo(map);

// Get location
if (navigator.geolocation) {
    navigator.geolocation.watchPosition(position => {

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const accuracy = position.coords.accuracy;

        userMarker.setLatLng([lat, lon]);
        accuracyCircle.setLatLng([lat, lon]);
        accuracyCircle.setRadius(accuracy);

        map.setView([lat, lon], 18);

    }, error => {
        alert("Location permission required for this page to work.");
    }, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 5000
    });
}

// Phone rotation → rotate map
let currentRotation = 0;

function rotateMap(deg) {
    const mapElement = document.getElementById("map");
    mapElement.style.transform = `rotate(${-deg}deg)`;
}

// iPhone requires permission
function requestOrientationPermission() {

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
        .then(permissionState => {
            if (permissionState === 'granted') {
                window.addEventListener("deviceorientationabsolute", handleOrientation, true);
            }
        })
        .catch(console.error);
    } else {
        window.addEventListener("deviceorientationabsolute", handleOrientation, true);
    }
}

function handleOrientation(event) {
    if (event.alpha !== null) {
        rotateMap(event.alpha);
    }
}

// Ask permission on first tap
document.body.addEventListener("click", requestOrientationPermission, { once: true });
</script>

</body>
</html>
