<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotating Map - Version 6</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}

/* VERSION NUMBER */
#versionNumber {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 70px;
    font-weight: bold;
    color: white;
    z-index: 1000;
}

/* Elevation display */
#elevationBox {
    position: absolute;
    bottom: 20px;
    left: 20px;
    font-size: 32px;
    font-weight: bold;
    color: white;
    z-index: 1000;
    background: rgba(0,0,0,0.4);
    padding: 10px 16px;
    border-radius: 12px;
}

/* Mode indicator */
#modeBox {
    position: absolute;
    bottom: 20px;
    right: 20px;
    font-size: 22px;
    font-weight: bold;
    color: white;
    z-index: 1000;
    background: rgba(0,0,0,0.4);
    padding: 8px 14px;
    border-radius: 10px;
}

/* This rotates */
#mapWrapper {
    position: fixed;
    width: 100vw;
    height: 100vh;
    transform-origin: center center;
}

/* Oversized square map */
#map {
    position: absolute;
    width: 200vmax;
    height: 200vmax;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

.leaflet-control-zoom {
    display: none;
}
</style>
</head>
<body>

<div id="versionNumber">6</div>
<div id="elevationBox">Elevation: -- ft</div>
<div id="modeBox">Loading Trails...</div>

<div id="mapWrapper">
    <div id="map"></div>
</div>

<script>
let map = L.map('map', {
    zoomControl: false,
    attributionControl: false
}).setView([0,0], 15);

let userLat = null;
let userLon = null;
let trailCenter = null;
let userMovedMap = false;

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

// Detect manual pan
map.on("movestart", () => {
    userMovedMap = true;
});

// ===== Load GeoJSON =====
fetch('/data/trails.geojson')
    .then(r => r.json())
    .then(data => {

        let trails = L.geoJSON(data, {
            style: {
                color: "#00ff88",
                weight: 4
            }
        }).addTo(map);

        let bounds = trails.getBounds();
        trailCenter = bounds.getCenter();

        // Default view = trail area
        map.fitBounds(bounds);

        document.getElementById("modeBox").innerHTML = "Browse Mode";

    });

// ===== Blue dot =====
let userMarker = L.circleMarker([0,0], {
    radius: 8,
    color: '#fff',
    weight: 2,
    fillColor: '#007aff',
    fillOpacity: 1
}).addTo(map);

let accuracyCircle = L.circle([0,0], {
    radius: 0,
    color: '#007aff',
    fillColor: '#007aff',
    fillOpacity: 0.15,
    weight: 1
}).addTo(map);

// ===== Elevation =====
let elevationBox = document.getElementById("elevationBox");

// ===== GPS =====
navigator.geolocation.watchPosition(position => {

    userLat = position.coords.latitude;
    userLon = position.coords.longitude;
    let accuracy = position.coords.accuracy;

    userMarker.setLatLng([userLat, userLon]);
    accuracyCircle.setLatLng([userLat, userLon]);
    accuracyCircle.setRadius(accuracy);

    // Elevation
    if (position.coords.altitude !== null) {
        let feet = position.coords.altitude * 3.28084;
        elevationBox.innerHTML = "Elevation: " + feet.toFixed(0) + " ft";
    }

    // Decide whether to center on user
    if (trailCenter && !userMovedMap) {

        let distance = map.distance([userLat, userLon], trailCenter);

        // If within 2 miles, switch to hiking mode
        if (distance < 3200) {
            map.setView([userLat, userLon], 17);
            document.getElementById("modeBox").innerHTML = "Hiking Mode";
        } else {
            document.getElementById("modeBox").innerHTML = "Browse Mode";
        }
    }

}, error => {
    console.log("GPS error");
}, {
    enableHighAccuracy: true
});

// ===== ROTATION =====
let mapWrapper = document.getElementById("mapWrapper");

function rotateMap(deg) {
    mapWrapper.style.transform = "rotate(" + (-deg) + "deg)";
}

window.onload = function() {

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        document.body.addEventListener("click", function() {
            DeviceOrientationEvent.requestPermission()
            .then(function(permissionState) {
                if (permissionState === 'granted') {
                    window.addEventListener("deviceorientation", handleOrientation);
                }
            });
        }, { once: true });
    } else {
        window.addEventListener("deviceorientation", handleOrientation);
    }
};

function handleOrientation(event) {

    let heading;

    if (event.webkitCompassHeading !== undefined) {
        heading = event.webkitCompassHeading;
    }
    else if (event.alpha !== null) {
        heading = 360 - event.alpha;
    }

    if (heading !== undefined) {
        rotateMap(heading);
    }
}
</script>

</body>
</html>
