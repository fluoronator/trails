<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotating Map - Version 2</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}

/* Large version number */
#versionNumber {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 60px;
    font-weight: bold;
    color: white;
    z-index: 1000;
    pointer-events: none;
}

#mapWrapper {
    height: 100%;
    width: 100%;
    transform-origin: center center;
}

#map {
    height: 100%;
    width: 100%;
}

.leaflet-control-zoom {
    display: none;
}
</style>
</head>
<body>

<div id="versionNumber">2</div>

<div id="mapWrapper">
    <div id="map"></div>
</div>

<script>
let map = L.map('map', {
    zoomControl: false,
    attributionControl: false
}).setView([0,0], 18);

// OpenStreetMap tiles
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

// Blue dot
let userMarker = L.circleMarker([0,0], {
    radius: 8,
    color: '#fff',
    weight: 2,
    fillColor: '#007aff',
    fillOpacity: 1
}).addTo(map);

// Accuracy circle
let accuracyCircle = L.circle([0,0], {
    radius: 0,
    color: '#007aff',
    fillColor: '#007aff',
    fillOpacity: 0.15,
    weight: 1
}).addTo(map);

// Track location
navigator.geolocation.watchPosition(position => {

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    const accuracy = position.coords.accuracy;

    userMarker.setLatLng([lat, lon]);
    accuracyCircle.setLatLng([lat, lon]);
    accuracyCircle.setRadius(accuracy);

    map.setView([lat, lon], 18);

}, error => {
    alert("Location permission required.");
}, {
    enableHighAccuracy: true
});

// ===== Rotation logic =====

let mapWrapper = document.getElementById("mapWrapper");

function rotateMap(deg) {
    mapWrapper.style.transform = "rotate(" + (-deg) + "deg)";
}

// Ask permission on iPhone when the page loads
window.onload = function() {

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        document.body.addEventListener("click", function() {
            DeviceOrientationEvent.requestPermission()
            .then(function(permissionState) {
                if (permissionState === 'granted') {
                    window.addEventListener("deviceorientation", handleOrientation);
                }
            });
        }, { once: true });
    } else {
        window.addEventListener("deviceorientation", handleOrientation);
    }
};

function handleOrientation(event) {

    let heading;

    // iPhone
    if (event.webkitCompassHeading !== undefined) {
        heading = event.webkitCompassHeading;
    }
    // Android
    else if (event.alpha !== null) {
        heading = 360 - event.alpha;
    }

    if (heading !== undefined) {
        rotateMap(heading);
    }
}
</script>

</body>
</html>
