<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Trail Map v10</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Prevent caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- Your CSS -->
    <link rel="stylesheet" href="css/style.css?v=1.3" />

    <style>
        body {
            margin: 0;
        }

        #map {
            height: 100vh;
            width: 100vw;
        }

        #modeBox {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }

        /* ✅ Version label (bottom right) */
        #versionBox {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
        }
    </style>
</head>

<body>

<div id="map"></div>
<div id="modeBox">Loading...</div>

<!-- ✅ Version display -->
<div id="versionBox">v10</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Plugin -->
<script src="https://unpkg.com/leaflet-textpath@1.2.3/leaflet.textpath.js"></script>

<!-- Your JS -->
<script src="js/map.js?v=1.3"></script>
<script src="js/trails.js?v=1.3"></script>
<script src="js/gps.js?v=1.3"></script>
<script src="js/orientation.js?v=1.3"></script>

</body>
</html>
