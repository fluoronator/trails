<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotating Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}

/* This wrapper rotates instead of the map itself */
#mapWrapper {
    height: 100%;
    width: 100%;
    transform-origin: center center;
    transition: transform 0.15s linear;
}

#map {
    height: 100%;
    width: 100%;
}

.leaflet-control-zoom {
    display: none;
}
</style>
</head>
<body>

<div id="mapWrapper">
    <div id="map"></div>
</div>

<script>
let map = L.map('map', {
    zoomControl: false,
    attributionControl: false
}).setView([0,0], 18);

// OpenStreetMap tiles (free)
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

// Blue dot
let userMarker = L.circleMarker([0,0], {
    radius: 8,
    color: '#fff',
    weight: 2,
    fillColor: '#007aff',
    fillOpacity: 1
}).addTo(map);

// Accuracy circle
let accuracyCircle = L.circle([0,0], {
    radius: 0,
    color: '#007aff',
    fillColor: '#007aff',
    fillOpacity: 0.15,
    weight: 1
}).addTo(map);

// Track location
navigator.geolocation.watchPosition(position => {

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    const accuracy = position.coords.accuracy;

    userMarker.setLatLng([lat, lon]);
    accuracyCircle.setLatLng([lat, lon]);
    accuracyCircle.setRadius(accuracy);

    map.setView([lat, lon], 18);

}, error => {
    alert("Location permission is required.");
}, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 5000
});

// ===== Rotation logic =====

let mapWrapper = document.getElementById("mapWrapper");
let lastHeading = 0;

function rotateMap(heading) {
    mapWrapper.style.transform = `rotate(${-heading}deg)`;
}

// iPhone requires permission
function enableOrientation() {

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
        .then(permissionState => {
            if (permissionState === 'granted') {
                window.addEventListener("deviceorientation", handleOrientation, true);
            }
        })
        .catch(console.error);
    } else {
        window.addEventListener("deviceorientation", handleOrientation, true);
    }
}

function handleOrientation(event) {

    let heading;

    // iPhone
    if (event.webkitCompassHeading !== undefined) {
        heading = event.webkitCompassHeading;
    }
    // Android
    else if (event.alpha !== null) {
        heading = 360 - event.alpha;
    }

    if (heading !== undefined) {
        rotateMap(heading);
    }
}

// Ask permission on first tap
document.body.addEventListener("click", enableOrientation, { once: true });
</script>

</body>
</html>
